<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VARUN MARUTI — Workshop KPI Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Clash+Display:wght@500;600;700&family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#399499;--s1:#274a82;--s2:#131929;--s3:#1a2235;--b1:rgba(255,255,255,.06);--b2:rgba(255,255,255,.10);--b3:rgba(255,255,255,.18);--t1:#f1f5ff;--t2:#8896b3;--t3:#ffffff;--red:#f5304a;--amber:#f59e0b;--teal:#06b6d4;--green:#10b981;--violet:#8b5cf6;--pink:#ec4899;--sw:280px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;width:100%;background:var(--bg);color:var(--t1);font-family:'DM Sans',sans-serif;display:flex;overflow:hidden}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse 1000px 700px at 0% -10%,rgba(255,51,85,0.05) 0%,transparent 70%),radial-gradient(ellipse 800px 600px at 100% 110%,rgba(0,200,224,0.04) 0%,transparent 70%),radial-gradient(ellipse 600px 500px at 50% 50%,rgba(157,111,255,0.03) 0%,transparent 60%)}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background-image:linear-gradient(rgba(255,255,255,.012) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.012) 1px,transparent 1px);background-size:48px 48px}
/* ── LOADER ── */
#loader{position:fixed;inset:0;background:rgba(7,10,16,0.95);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:20px;visibility:hidden;opacity:0;transition:opacity .3s}
#loader.show{visibility:visible;opacity:1}
.loader-ring{width:85px;height:85px;border:3px solid var(--b2);border-top-color:var(--red);border-radius:50%;animation:spin .7s linear infinite}
.loader-text{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:4px;color:var(--t2);text-transform:uppercase}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── SIDEBAR ── */
.sidebar{width:var(--sw);min-width:var(--sw);background:var(--s1);border-right:1px solid var(--b2);
  display:flex;flex-direction:column;align-items:center;padding:22px 16px 26px;gap:14px;
  overflow-y:auto;position:relative;z-index:2;flex-shrink:0}
.sidebar::after{content:'';position:absolute;top:0;right:0;bottom:0;width:1px;
  background:linear-gradient(to bottom,transparent,rgba(255,51,85,0.5) 40%,rgba(157,111,255,0.4) 70%,transparent)}

/* logo */
.logo-wrap{width:72px;height:72px;border-radius:16px;overflow:hidden;background:#fff;flex-shrink:0;
  box-shadow:0 0 32px rgba(245,48,74,.2),0 8px 24px rgba(0,0,0,.5);
  border:1px solid rgba(245,48,74,.25)}
.logo-wrap img{width:100%;height:100%;object-fit:contain}

/* brand */
.brand{text-align:center}
.brand-name{font-family:'Syne',sans-serif;font-weight:800;font-size:14px;letter-spacing:2px;color:var(--t1);text-transform:uppercase}
.brand-sub{font-size:8.5px;color:var(--red);letter-spacing:3.5px;text-transform:uppercase;font-weight:600;margin-top:3px}

.divider{width:100%;height:1px;background:linear-gradient(to right,transparent,var(--b3),transparent);margin:2px 0}

/* channel toggle */
.flabel{align-self:flex-start;font-size:8px;font-weight:700;letter-spacing:3px;color:var(--t3);text-transform:uppercase}
.channel-toggle{width:100%;display:grid;grid-template-columns:1fr 1fr;gap:4px;
  background:rgba(255,255,255,0.03);border:1px solid var(--b2);border-radius:12px;padding:4px}
.ch-btn{padding:9px 4px;border:none;border-radius:9px;font-family:'Space Mono',monospace;
  font-size:10px;font-weight:700;letter-spacing:2px;cursor:pointer;transition:all .25s;
  color:var(--t2);background:transparent;text-transform:uppercase;position:relative;overflow:hidden}
.ch-btn::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.05),transparent);opacity:0;transition:opacity .2s;border-radius:8px}
.ch-btn:hover::after{opacity:1}
.ch-btn.active{background:var(--red);color:#fff;box-shadow:0 4px 16px rgba(255,51,85,0.4),inset 0 1px 0 rgba(255,255,255,0.15)}
.ch-btn.active::after{display:none}

/* select */
.swrap{width:100%;position:relative}
.swrap::after{content:'▾';position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--t3);pointer-events:none;font-size:11px}
.swrap select{width:100%;background:var(--s3);color:var(--t1);border:1px solid var(--b2);border-radius:10px;
  padding:10px 30px 10px 13px;font-family:'DM Sans',sans-serif;font-size:12.5px;appearance:none;cursor:pointer;
  transition:border-color .2s,box-shadow .2s;outline:none}
.swrap select:focus{border-color:rgba(255,51,85,.5);box-shadow:0 0 0 3px rgba(255,51,85,.08)}
.swrap select option{background:var(--s2)}

/* nav pills */
.nav-pill{width:100%;display:flex;align-items:center;gap:10px;padding:11px 13px;border:1px solid red;border-radius:11px;font-size:11.5px;font-weight:600;color:#ffffff;background:rgba(255,255,255,0.2);cursor:pointer;transition:all .2s;text-decoration:none;letter-spacing:.3px;position:relative;overflow:hidden}
.nav-pill::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--red);transform:scaleY(0);transition:transform .2s;border-radius:0 2px 2px 0}
.nav-pill:hover{color:var(--t1);border-color:var(--b3);background:rgba(255,255,255,0.04)}
.nav-pill:hover::before{transform:scaleY(1)}
.nav-pill .np-icon{font-size:15px;flex-shrink:0;border-radius:5px;}
.nav-pill .np-arrow{margin-left:auto;font-size:11px;opacity:.3;transition:opacity .2s,transform .2s}
.nav-pill:hover .np-arrow{opacity:.7;transform:translateX(2px)}

/* info card */
.info-card{width:100%;background:rgba(255,255,255,0.02);border:1px solid var(--b2);border-radius:13px;
  padding:12px 14px;display:flex;flex-direction:column;gap:8px;margin-top:auto}
.irow{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--t2)}
.irow .ico{font-size:13px;flex-shrink:0;opacity:.8}
.irow .ival{color:var(--t1);font-weight:600;margin-left:auto;font-family:'Space Mono',monospace;font-size:10px;text-align:right;max-width:140px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.irow .ilabel{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;font-weight:700;opacity:.95;color:yellow;}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;z-index:1}

/* topbar */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:18px 28px 14px;
  border-bottom:1px solid var(--b2);flex-shrink:0;
  background:linear-gradient(180deg,rgba(7,10,16,0.9) 0%,rgba(7,10,16,0.6) 100%);
  backdrop-filter:blur(20px);gap:12px;position:relative}
.topbar::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(to right,transparent,rgba(255,51,85,0.3) 30%,rgba(157,111,255,0.25) 70%,transparent)}
.tl{display:flex;flex-direction:column;gap:2px}
.teyebrow{font-size:8px;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:var(--red);opacity:.9}
.ttitle span{color:var(--red)}
.ttitle{font-family:'Syne',sans-serif;font-weight:800;font-size:20px;color:var(--t1)}
.ttitle span{color:var(--red)}
.tr{display:flex;align-items:center;gap:10px}
.tbadge{display:flex;align-items:center;gap:8px;
  background:rgba(255,255,255,0.04);border:1px solid var(--b2);
  border-radius:30px;padding:6px 16px;font-size:11px;color:var(--t2);font-weight:500}
.tbadge b{color:var(--teal);font-family:'Space Mono',monospace;font-weight:700}
.dot{width:6px;height:6px;border-radius:50%;background:#00E5A0;box-shadow:0 0 8px #00E5A0;animation:pulse 2.5s ease infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.75)}}

/* content */
.content{flex:1;overflow-y:auto;padding:24px 28px 28px}

/* ── SECTION LABEL ── */
.slabel{font-size:8px;font-weight:700;letter-spacing:3.5px;text-transform:uppercase;color:var(--red);
  margin-bottom:14px;display:flex;align-items:center;gap:12px}
.slabel::before{content:'';width:3px;height:12px;background:currentColor;border-radius:2px;flex-shrink:0}
.slabel::after{content:'';flex:1;height:1px;background:linear-gradient(to right,var(--b2),transparent)}

/* ── KPI CARDS ── */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:22px}
.kcard{background:var(--s2);border:1px solid var(--b2);border-radius:16px;padding:16px 15px 14px;
  position:relative;overflow:hidden;transition:transform .25s,box-shadow .25s,border-color .25s;cursor:default}
.kcard:hover{transform:translateY(-3px)}

/* top accent line */
.kcard::before{content:'';position:absolute;top:0;left:0;right:0;height:1.5px;border-radius:16px 16px 0 0;opacity:.9}
/* glow blob */
.kcard::after{content:'';position:absolute;top:-30px;right:-30px;width:90px;height:90px;border-radius:50%;opacity:.06;pointer-events:none;filter:blur(20px)}

.kcard.red::before{background:linear-gradient(90deg,var(--red),rgba(255,51,85,0.1))}
.kcard.red::after{background:var(--red)}
.kcard.red:hover{border-color:rgba(255,51,85,.3);box-shadow:0 8px 40px rgba(255,51,85,.12),0 2px 12px rgba(0,0,0,.5)}
.kcard.amber::before{background:linear-gradient(90deg,var(--amber),rgba(245,166,35,0.1))}
.kcard.amber::after{background:var(--amber)}
.kcard.amber:hover{border-color:rgba(245,166,35,.3);box-shadow:0 8px 40px rgba(245,166,35,.12),0 2px 12px rgba(0,0,0,.5)}
.kcard.teal::before{background:linear-gradient(90deg,var(--teal),rgba(0,200,224,0.1))}
.kcard.teal::after{background:var(--teal)}
.kcard.teal:hover{border-color:rgba(0,200,224,.3);box-shadow:0 8px 40px rgba(0,200,224,.12),0 2px 12px rgba(0,0,0,.5)}
.kcard.green::before{background:linear-gradient(90deg,var(--green),rgba(0,229,160,0.1))}
.kcard.green::after{background:var(--green)}
.kcard.green:hover{border-color:rgba(0,229,160,.3);box-shadow:0 8px 40px rgba(0,229,160,.12),0 2px 12px rgba(0,0,0,.5)}
.kcard.violet::before{background:linear-gradient(90deg,var(--violet),rgba(157,111,255,0.1))}
.kcard.violet::after{background:var(--violet)}
.kcard.violet:hover{border-color:rgba(157,111,255,.3);box-shadow:0 8px 40px rgba(157,111,255,.12),0 2px 12px rgba(0,0,0,.5)}
.kcard.pink::before{background:linear-gradient(90deg,var(--pink),rgba(255,95,160,0.1))}
.kcard.pink::after{background:var(--pink)}
.kcard.pink:hover{border-color:rgba(255,95,160,.3);box-shadow:0 8px 40px rgba(255,95,160,.12),0 2px 12px rgba(0,0,0,.5)}

.klabel{font-size:8px;font-weight:700;letter-spacing:2.5px;color:var(--t3);text-transform:uppercase;margin-bottom:8px}
.kvals{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.kv-item{display:flex;flex-direction:column;gap:2px}
.kv-tag{font-size:7.5px;font-weight:700;letter-spacing:2px;color:var(--t2);text-transform:uppercase;
  display:inline-flex;align-items:center;gap:3px}
.kv-tag::before{content:'';width:3px;height:3px;border-radius:50%;background:currentColor;opacity:.5}
.kv-num{font-family:'Space Mono',monospace;font-size:16px;font-weight:700;line-height:1.15;letter-spacing:-0.5px}
.kcard.red    .kv-num{color:var(--red)}
.kcard.amber  .kv-num{color:var(--amber)}
.kcard.teal   .kv-num{color:var(--teal)}
.kcard.green  .kv-num{color:var(--green)}
.kcard.violet .kv-num{color:var(--violet)}
.kcard.pink   .kv-num{color:var(--pink)}

.kbar{height:2px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden;margin-bottom:8px}
.kfill{height:100%;border-radius:2px;transition:width 1.3s cubic-bezier(.6,0,.2,1)}
.kcard.red    .kfill{background:linear-gradient(90deg,var(--red),rgba(255,51,85,0.5))}
.kcard.amber  .kfill{background:linear-gradient(90deg,var(--amber),rgba(245,166,35,0.5))}
.kcard.teal   .kfill{background:linear-gradient(90deg,var(--teal),rgba(0,200,224,0.5))}
.kcard.green  .kfill{background:linear-gradient(90deg,var(--green),rgba(0,229,160,0.5))}
.kcard.violet .kfill{background:linear-gradient(90deg,var(--violet),rgba(157,111,255,0.5))}
.kcard.pink   .kfill{background:linear-gradient(90deg,var(--pink),rgba(255,95,160,0.5))}

.kpct{font-size:10px;display:flex;align-items:center;gap:4px;justify-content:space-between}
.kpct-label{color:var(--t2);font-size:9px;font-family:'Space Mono',monospace;opacity:.8}
.kpct-growth{font-weight:700;font-family:'Space Mono',monospace;font-size:10px;padding:1px 6px;border-radius:5px}
.growth-up{color:#00E5A0;background:rgba(0,229,160,0.1)}
.growth-down{color:var(--red);background:rgba(255,51,85,0.1)}
.growth-flat{color:var(--t2);background:rgba(255,255,255,0.05)}

/* ── CHARTS ── */
.cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;margin-top:4px}
.ccard{background:var(--s2);border:1px solid var(--b2);border-radius:16px;padding:20px;
  display:flex;flex-direction:column;gap:14px;transition:border-color .25s;position:relative;overflow:hidden}
.ccard::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(to right,transparent,rgba(255,255,255,0.06),transparent)}
.ccard:hover{border-color:var(--b3)}
.cheader{display:flex;align-items:center;justify-content:space-between}
.ctitle{font-size:9px;font-weight:700;letter-spacing:2.5px;color:var(--t3);text-transform:uppercase;
  display:flex;align-items:center;gap:8px}
.ctitle .dot2{width:5px;height:5px;border-radius:50%;flex-shrink:0;box-shadow:0 0 8px currentColor}
.cwrap{flex:1;min-height:210px;position:relative}

/* empty state */
.empty-state{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;color:var(--t3);user-select:none;padding:40px}
.empty-icon{font-size:52px;opacity:.85;filter:grayscale(1)}
.empty-text{font-family:'Clash Display',sans-serif;font-size:16px;letter-spacing:2px;text-transform:uppercase;opacity:.95; color:white;}
.empty-sub{font-size:12px;color:var(--t2);text-align:center;max-width:270px;line-height:1.7;opacity:.7; color:white;}
.load-overlay{position:fixed;inset:0;z-index:9999;background:rgba(8,12,20,.9);backdrop-filter:blur(10px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;transition:opacity .4s ease;}
.load-overlay.hidden{opacity:0;pointer-events:none}
.load-ring-wrap{position:relative;display:flex;align-items:center;justify-content:center}
.load-ring{width:64px;height:64px;border-radius:50%;border:3px solid rgba(255,255,255,.07);border-top-color:var(--red);border-right-color:var(--amber);animation:spin 1s linear infinite;box-shadow:0 0 24px rgba(245,48,74,.3);}
.load-logo{position:absolute;width:36px;height:36px;border-radius:8px;overflow:hidden;background:#fff}
.load-logo img{width:100%;height:100%;object-fit:contain}
.load-text{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:var(--t1);letter-spacing:1px}
.load-sub{font-size:11px;color:var(--t2);letter-spacing:2px;text-transform:uppercase}
.load-dots span{animation:blink 1.2s infinite;opacity:0}
.load-dots span:nth-child(2){animation-delay:.2s}
.load-dots span:nth-child(3){animation-delay:.4s}

/* scrollbar */
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.06);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.12)}

@media(max-width:1100px){.cgrid{grid-template-columns:1fr 1fr}}
@media(max-width:820px){:root{--sw:0px}.sidebar{display:none}.cgrid{grid-template-columns:1fr}}
</style>
</head>
<body>

<div id="loader">
  <div class="loader-ring"></div>
  <div class="loader-text">Loading Data…</div>
</div>
<div class="load-overlay" id="loadOverlay">
<div class="load-ring-wrap">
<div class="load-ring"></div>
<div class="load-logo"><img src="https://lh3.googleusercontent.com/d/1ES-euNiP7XqrsflQXpnEIv23gMWXTerv" alt="Logo"></div>
</div>
<div class="load-text">Loading Data<span class="load-dots"><span>.</span><span>.</span><span>.</span></span></div>
<div class="load-sub">Fetching Workshops Data</div>
</div>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="logo-wrap">
    <img src="https://lh3.googleusercontent.com/d/1ES-euNiP7XqrsflQXpnEIv23gMWXTerv" alt="Logo">
  </div>
  <div class="brand">
    <div class="brand-name">VARUN MARUTI</div>
    <div class="brand-sub">Workshop KPI</div>
  </div>
  <div class="divider"></div>

  <div class="flabel">Channel</div>
  <div class="channel-toggle">
    <button class="ch-btn active" id="arenaBtn">ARENA</button>
    <button class="ch-btn" id="nexaBtn">NEXA</button>
  </div>

  <div class="flabel">Workshop</div>
  <div class="swrap">
    <select id="workshopSelect"><option value="">— Select Workshop —</option></select>
  </div>

  <div class="divider"></div>

  <a class="nav-pill" href="advisor.html">
    <span class="np-icon">👤</span>
    <span>Advisor Performance</span>
    <span class="np-arrow">›</span>
  </a>
  <a class="nav-pill" href="technician.html">
    <span class="np-icon">🔧</span>
    <span>Technician Performance</span>
    <span class="np-arrow">›</span>
  </a>

  <div class="info-card">
    <div class="irow">
      <span class="ico">🏢</span>
      <span class="ilabel">Cluster Head</span>
      <span class="ival" id="Cluster_Head">—</span>
    </div>
    <div class="irow">
      <span class="ico">👷</span>
      <span class="ilabel">WM / QM</span>
      <span class="ival" id="Works_Manager">—</span>
    </div>
  </div>
</aside>

<!-- MAIN -->
<main class="main">
  <div class="topbar">
    <div class="tl">
       <div class="ttitle" id="channelTitle">ARENA <span>CHANNEL</span> OVERVIEW</div>
      </div>
    <div class="tr">
      <div class="dot"></div>
      <div class="tbadge">MTD &nbsp;·&nbsp; <b id="monthLabel">—</b></div>
    </div>
  </div>


  <div class="content" id="contentArea">
    <div class="empty-state">
      <div class="empty-icon">🏭</div>
      <div class="empty-text">Select a Workshop</div>
      <div class="empty-sub">Choose a channel and workshop from the sidebar to view KPI metrics</div>
    </div>
  </div>
</main>

<script>
document.addEventListener('contextmenu', e => e.preventDefault());
document.onkeydown = e => { if(e.keyCode===123||(e.ctrlKey&&e.shiftKey&&e.keyCode===73)||(e.ctrlKey&&e.keyCode===85)) return false; };
Chart.register(ChartDataLabels);

const API_URL = "https://script.google.com/macros/s/AKfycbwQMksBtwCcRr0gkFHMdtlCuhElexU_fh1fDlOA69ECjZBxJXW4ywutrWm_5x5hkxWk/exec";
const C = { red:'#FF3355', amber:'#F5A623', teal:'#00C8E0', green:'#00E5A0', violet:'#9D6FFF', pink:'#FF5FA0' };

let DATA = [], charts = {}, currentChannel = "ARENA";
const $ = id => document.getElementById(id);

const KPI_DEFS = [
  // Service Repairs
  { label:'Ser Load',     ly:'LY_S_Load',    cy:'CY_S_Load',     col:'red',    section:'Service Repairs', lakh:false },
  { label:'Ser Labour',   ly:'LY_S_Labour',  cy:'CY_S_Labour',   col:'amber',  section:'Service Repairs', lakh:true  },
  { label:'Ser Per RO',   col:'teal',  section:'Service Repairs', lakh:false, perRO:true,
    lyLab:'LY_S_Labour', lyLoad:'LY_S_Load', cyLab:'CY_S_Labour', cyLoad:'CY_S_Load' },
  { label:'Ser Spares',   ly:'LY_S_MSGP',    cy:'CY_S_MSGP',     col:'green',  section:'Service Repairs', lakh:true  },
  { label:'FSC Load',     ly:'LY_FSC_LOAD',  cy:'CY_FSC_LOAD',   col:'violet', section:'Service Repairs', lakh:false },
  { label:'PMS Load',     ly:'LY_PMS_LOAD',  cy:'CY_PMS_LOAD',   col:'pink',   section:'Service Repairs', lakh:false },
  { label:'RR Load',      ly:'LY_RR_LOAD',   cy:'CY_RR_LOAD',    col:'red',    section:'Service Repairs', lakh:false },
  { label:'Ser Holdup',   ly:'LY_S_Load',    cy:'Ser_Holdup',    col:'amber',  section:'Service Repairs', lakh:false },
  { label:'Ser DIY',      ly:'LY_S_Load',    cy:'CY_S_DIY',      col:'teal',   section:'Service Repairs', lakh:false },
  { label:'EW Sold',      ly:'LY_S_Load',    cy:'EW_Extended',   col:'green',  section:'Value-Add',       lakh:false },
  { label:'AMC Books',    ly:'LY_S_Load',    cy:'AMC_Books',     col:'violet', section:'Value-Add',       lakh:false },
  { label:'CCP With PMS', ly:'LY_S_Load',    cy:'CCP_PMS',       col:'pink',   section:'Value-Add',       lakh:false },
  { label:'EW Extension', ly:'LY_S_Load',    cy:'EW_Extended',   col:'red',    section:'Value-Add',       lakh:false },
  { label:'EW Power Plus',ly:'LY_S_Load',    cy:'EW_Power_Plus', col:'amber',  section:'Value-Add',       lakh:false },
  // Body Shop
  { label:'BS Load',      ly:'LY_B_Load',    cy:'CY_B_Load',     col:'teal',   section:'Body Shop',       lakh:false },
  { label:'BS Labour',    ly:'LY_B_Labour',  cy:'CY_B_Labour',   col:'green',  section:'Body Shop',       lakh:true  },
  { label:'BS Per RO',    col:'violet', section:'Body Shop',  lakh:false, perRO:true,
    lyLab:'LY_B_Labour', lyLoad:'LY_B_Load', cyLab:'CY_B_Labour', cyLoad:'CY_B_Load' },
  { label:'BS Holdup',    ly:'LY_B_Load',    cy:'BS_Holdup',     col:'pink',   section:'Body Shop',       lakh:false },
  { label:'BS Smart Eye', ly:'LY_B_Load',    cy:'BS_Smart_Eye',  col:'red',    section:'Body Shop',       lakh:false },
];

function showLoader(){ $('loader').classList.add('show'); }
function hideLoader(){ $('loader').classList.remove('show'); }
function fmtL(v){ return (v/100000).toFixed(1)+'L'; }

// Load values: always plain integer — no lakh, no k conversion
function fmtLoad(v){ return v > 0 ? v.toLocaleString('en-IN') : '—'; }
// Per RO values: plain ₹ amount — no k/lakh conversion
function fmtPerRO(v){ return v > 0 ? '₹' + v.toLocaleString('en-IN') : '—'; }
// Labour / Spares: lakh format
function fmt(v, lakh){ if(lakh) return fmtL(v); return v>=1000?(v/1000).toFixed(1)+'k':v.toLocaleString('en-IN'); }

async function fetchWithTimeout(url, options, timeoutMs){
  options = options||{}; timeoutMs = timeoutMs||20000;
  const controller = new AbortController();
  const timer = setTimeout(()=>controller.abort(), timeoutMs);
  try {
    const res = await fetch(url, Object.assign({}, options, {signal:controller.signal}));
    clearTimeout(timer);
    return res;
  } catch(e){ clearTimeout(timer); throw e; }
}

async function loadData(retries){
  retries = retries||3;
  for(let attempt=1; attempt<=retries; attempt++){
    try {
      const res = await fetchWithTimeout(API_URL, {method:'GET', redirect:'follow', cache:'no-store'}, 20000);
      if(!res.ok) throw new Error('HTTP '+res.status);
      const text = await res.text();
      if(!text||!text.trim()) throw new Error('Empty response');
      const json = JSON.parse(text);
      if(!Array.isArray(json)) throw new Error('Expected array');
      return json;
    } catch(e){
      console.warn('Attempt '+attempt+' failed: '+e.message);
      if(attempt===retries) throw e;
      await new Promise(r=>setTimeout(r, 1500*attempt));
    }
  }
}

function showError(msg){
  $('contentArea').innerHTML =
    '<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-text">Data Load Failed</div>'+
    '<div class="empty-sub">'+msg+'<br><br>'+
    '<button onclick="retryInit()" style="margin-top:8px;padding:8px 20px;background:var(--red);color:#fff;border:none;border-radius:8px;cursor:pointer;font-family:DM Sans,sans-serif;font-size:12px;font-weight:600;letter-spacing:1px">↺ Retry</button>'+
    '</div></div>';
}

async function retryInit(){
  $('contentArea').innerHTML = '';
  await init();
}

async function init(){
  const overlay = $('loadOverlay');
  if(overlay) overlay.classList.remove('hidden');
  showLoader();
  $('monthLabel').textContent = new Date().toLocaleString('en-IN',{month:'long',year:'numeric'});
  try {
    DATA = await loadData(3);
    buildDropdown();
  } catch(e){
    console.error('Data load error:', e);
    showError(e.name==='AbortError'
      ? 'Request timed out. Check your connection.'
      : 'Could not reach the data server. Please try again.');
  } finally {
    hideLoader();
    if(overlay) overlay.classList.add('hidden');
  }
}

function buildDropdown(){
  const sel = $('workshopSelect');
  const workshops = [...new Set(DATA.map(d=>d.Workshop).filter(Boolean))].sort();
  sel.innerHTML = '<option value="">— Select Workshop —</option>';
  workshops.forEach(w => sel.appendChild(new Option(w, w)));
}

$('arenaBtn').onclick = () => { currentChannel='ARENA'; setChannel(); };
$('nexaBtn').onclick  = () => { currentChannel='NEXA';  setChannel(); };
function setChannel(){
  $('arenaBtn').classList.toggle('active', currentChannel==='ARENA');
  $('nexaBtn').classList.toggle('active',  currentChannel==='NEXA');
  $('channelTitle').innerHTML = `${currentChannel} <span>CHANNEL </span>OVERVIEW`;
  triggerUpdate();
}

$('workshopSelect').addEventListener('change', triggerUpdate);

function triggerUpdate(){
  const val = $('workshopSelect').value;
  if(!val){ resetEmpty(); return; }
  const filtered = DATA.filter(d => d.Workshop===val && d.Channel===currentChannel);
  if(filtered.length){
    $('Cluster_Head').textContent  = filtered[0].Cluster_Head  || '—';
    $('Works_Manager').textContent = filtered[0].Works_Manager || '—';
  }
  renderDashboard(filtered);
}

function resetEmpty(){
  $('Cluster_Head').textContent  = '—';
  $('Works_Manager').textContent = '—';
  $('contentArea').innerHTML = `<div class="empty-state"><div class="empty-icon">🏭</div><div class="empty-text">Select a Workshop</div><div class="empty-sub">Choose a channel and workshop from the sidebar to view KPI metrics</div></div>`;
  destroyCharts();
}

function destroyCharts(){ Object.values(charts).forEach(c=>c.destroy()); charts={}; }

function renderDashboard(data){
  destroyCharts();

  const totals = {};
  KPI_DEFS.forEach(k=>{
    if(k.perRO) totals[k.label] = {lyLab:0, lyLoad:0, cyLab:0, cyLoad:0};
    else        totals[k.label] = {LY:0, CY:0};
  });
  const pieData  = {FSC:0,PMS:0,RR:0,SER:0};
  const pmsSplit = {PMS2:0,PMS3:0,PMS4:0,PMS5:0,'PMS>5':0};

  data.forEach(d=>{
    pieData.SER += Number(d.CY_S_Load||0);
    pieData.FSC += Number(d.CY_FSC_LOAD||0);
    pieData.PMS += Number(d.CY_PMS_LOAD||0);
    pieData.RR  += Number(d.CY_RR_LOAD||0);
    pmsSplit.PMS2     += Number(d.PMS2||0);
    pmsSplit.PMS3     += Number(d.PMS3||0);
    pmsSplit.PMS4     += Number(d.PMS4||0);
    pmsSplit.PMS5     += Number(d.PMS5||0);
    pmsSplit['PMS>5'] += Number(d['PMS>5']||0);
    KPI_DEFS.forEach(k=>{
      if(k.perRO){
        totals[k.label].lyLab  += Number(d[k.lyLab]||0);
        totals[k.label].lyLoad += Number(d[k.lyLoad]||0);
        totals[k.label].cyLab  += Number(d[k.cyLab]||0);
        totals[k.label].cyLoad += Number(d[k.cyLoad]||0);
      } else {
        totals[k.label].LY += Number(d[k.ly]||0);
        totals[k.label].CY += Number(d[k.cy]||0);
      }
    });
  });

  KPI_DEFS.forEach(k=>{
    if(k.perRO){
      const t = totals[k.label];
      t.LY = t.lyLoad > 0 ? Math.round(t.lyLab / t.lyLoad) : 0;
      t.CY = t.cyLoad > 0 ? Math.round(t.cyLab / t.cyLoad) : 0;
    }
  });

  const sections = {};
  KPI_DEFS.forEach(k=>{
    if(!sections[k.section]) sections[k.section]=[];
    sections[k.section].push(k);
  });

  const sectionColors = {'Service Repairs':'var(--red)','Value-Add':'var(--violet)','Body Shop':'var(--teal)'};
  let html = '';

  Object.entries(sections).forEach(([sec,kpis])=>{
    html += `<div class="slabel" style="color:${sectionColors[sec]||'var(--red)'}">${sec}</div>`;
    html += `<div class="kpi-grid" style="margin-bottom:22px">`;
    kpis.forEach(k=>{
      const LY = totals[k.label].LY;
      const CY = totals[k.label].CY;
      const SRT = CY - LY;
      const growth = LY ? ((CY/LY-1)*100) : 0;
      const growthCls = growth>0?'growth-up':growth<0?'growth-down':'growth-flat';
      const growthTxt = growth>0?`↑${growth.toFixed(1)}%`:growth<0?`↓${Math.abs(growth).toFixed(1)}%`:`0%`;
      const pctBar = LY ? Math.min(Math.round(CY/LY*100),100) : (CY>0?100:0);
      const srtSign = SRT>0?'+':'';

      // Format: Load fields = plain integer; Per RO = plain ₹ integer; Labour/Spares = lakh
      let fmtVal;
      if(k.perRO){
        fmtVal = v => fmtPerRO(v);
      } else if(k.lakh){
        fmtVal = v => v > 0 ? fmtL(v) : '—';
      } else {
        fmtVal = v => fmtLoad(v);
      }

      const srtLabel = k.perRO ? '₹/RO' : 'SRT';
      // SRT for Per RO: plain ₹ difference; Load: plain integer; Labour: lakh
      let srtDisplay;
      if(k.perRO){
        srtDisplay = (SRT>=0?'+':'')+'₹'+Math.abs(SRT).toLocaleString('en-IN');
      } else if(k.lakh){
        srtDisplay = srtSign+fmtL(SRT);
      } else {
        srtDisplay = srtSign+SRT.toLocaleString('en-IN');
      }

      html += `
      <div class="kcard ${k.col}">
        <div class="klabel">${k.label}</div>
        <div class="kvals">
          <div class="kv-item"><div class="kv-tag">LY</div><div class="kv-num">${fmtVal(LY)}</div></div>
          <div class="kv-item"><div class="kv-tag">CY</div><div class="kv-num">${fmtVal(CY)}</div></div>
        </div>
        <div class="kbar"><div class="kfill" style="width:0%" data-w="${pctBar}"></div></div>
        <div class="kpct">
          <span class="kpct-label">${srtLabel} ${srtDisplay}</span>
          <span class="kpct-growth ${growthCls}">${growthTxt}</span>
        </div>
      </div>`;
    });
    html += '</div>';
  });

  html += `<div class="slabel">Visual Analytics</div>`;
  html += `<div class="cgrid">
    <div class="ccard"><div class="cheader"><div class="ctitle"><span class="dot2" style="background:var(--teal)"></span>Service Wise Load</div></div><div class="cwrap"><canvas id="chartLoad"></canvas></div></div>
    <div class="ccard"><div class="cheader"><div class="ctitle"><span class="dot2" style="background:var(--violet)"></span>PMS Sub-Services</div></div><div class="cwrap"><canvas id="chartPMS"></canvas></div></div>
    <div class="ccard"><div class="cheader"><div class="ctitle"><span class="dot2" style="background:var(--amber)"></span>NPS &amp; CEI Scores</div></div><div class="cwrap"><canvas id="chartNPS"></canvas></div></div>
  </div>`;

  $('contentArea').innerHTML = html;

  setTimeout(()=> document.querySelectorAll('.kfill[data-w]').forEach(el=>{el.style.width=el.dataset.w+'%'}), 60);
  setTimeout(()=>{ drawLoadChart(pieData); drawPMSChart(pmsSplit); drawNPSChart(data[0]||{}); }, 120);
}

function drawLoadChart(p){
  const id='chartLoad'; if(charts[id]) charts[id].destroy();
  const others = Math.max(0, p.SER-(p.FSC+p.PMS+p.RR));
  const values = [p.FSC, p.PMS, p.RR, others];
  const total  = values.reduce((a,b)=>a+b,0);
  const colors = ['#00C8E0','#9D6FFF','#00E5A0','#F5A623'];
  charts[id] = new Chart($('chartLoad'), {
    type:'doughnut',
    data:{ labels:['FSC','PMS','RR','Others'], datasets:[{ data:values, backgroundColor:colors.map(c=>c+'bb'), borderColor:colors, borderWidth:1.5, hoverOffset:10 }]},
    options:{
      responsive:true, maintainAspectRatio:false, cutout:'68%',
      plugins:{
        legend:{display:true, position:'bottom', labels:{color:'#7A8BAA',font:{family:'DM Sans',size:10},padding:14,usePointStyle:true,pointStyleWidth:7}},
        datalabels:{color:'#fff',font:{family:'Space Mono',size:10,weight:'700'},formatter:(v,ctx)=>{const pct=total?((v/total)*100).toFixed(1):'0.0';return v>0?`${v}\n${pct}%`:'';}},
        tooltip:{callbacks:{label:ctx=>`${ctx.label}: ${ctx.raw} (${total?((ctx.raw/total)*100).toFixed(1):'0'}%)`}}
      }
    }, plugins:[ChartDataLabels]
  });
}

function drawPMSChart(p){
  const id='chartPMS'; if(charts[id]) charts[id].destroy();
  const values = [p.PMS2, p.PMS3, p.PMS4, p.PMS5, p['PMS>5']];
  const total  = values.reduce((a,b)=>a+b,0);
  const colors = ['#FF3355','#F5A623','#00E5A0','#00C8E0','#9D6FFF'];
  charts[id] = new Chart($('chartPMS'), {
    type:'doughnut',
    data:{ labels:['PMS2','PMS3','PMS4','PMS5','PMS>5'], datasets:[{ data:values, backgroundColor:colors.map(c=>c+'bb'), borderColor:colors, borderWidth:1.5, hoverOffset:10 }]},
    options:{
      responsive:true, maintainAspectRatio:false, cutout:'68%',
      plugins:{
        legend:{display:true, position:'bottom', labels:{color:'#7A8BAA',font:{family:'DM Sans',size:10},padding:14,usePointStyle:true,pointStyleWidth:7}},
        datalabels:{color:'#fff',font:{family:'Space Mono',size:10,weight:'700'},formatter:(v,ctx)=>{const pct=total?((v/total)*100).toFixed(1):'0.0';return v>0?`${v}\n${pct}%`:'';}},
        tooltip:{callbacks:{label:ctx=>`${ctx.label}: ${ctx.raw}`}}
      }
    }, plugins:[ChartDataLabels]
  });
}

function drawNPSChart(d){
  const id='chartNPS'; if(charts[id]) charts[id].destroy();
  const labels = ['S-NPS','S-CEI','B-NPS','B-CEI'];
  const values = [Number(d.S_NPS||0), Number(d.S_CEI||0), Number(d.B_NPS||0), Number(d.B_CEI||0)];
  const bgColors= ['#FF3355bb','#00E5A0bb','#F5A623bb','#9D6FFFbb'];
  const bdrColors=['#FF3355','#00E5A0','#F5A623','#9D6FFF'];
  charts[id] = new Chart($('chartNPS'), {
    type:'bar',
    data:{ labels, datasets:[{ data:values, backgroundColor:bgColors, borderColor:bdrColors, borderWidth:1.5, borderRadius:10, barPercentage:.6 }]},
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{
        legend:{display:false},
        datalabels:{color:'#F0F4FF',anchor:'end',align:'end',font:{family:'Space Mono',size:12,weight:'700'},formatter:v=>v||''}
      },
      scales:{
        x:{ticks:{color:'#7A8BAA',font:{family:'DM Sans',size:11}},grid:{display:false},border:{display:false}},
        y:{beginAtZero:true,ticks:{color:'#7A8BAA',font:{family:'Space Mono',size:10}},grid:{color:'rgba(255,255,255,0.03)'},border:{display:false}}
      }
    }, plugins:[ChartDataLabels]
  });
}

init();
</script>
