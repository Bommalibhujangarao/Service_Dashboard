<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VARUN MARUTI — Advisor KPI Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Syne:wght@600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d1117;--s1:#131b2e;--s2:#0a0f1a;--s3:#1a2235;--b1:rgba(255,255,255,.06);--b2:rgba(255,255,255,.10);--t1:#f1f5ff;--t2:#8896b3;--t3:#ffffff;--red:#f5304a;--amber:#f59e0b;--teal:#06b6d4;--green:#10b981;--violet:#8b5cf6;--pink:#ec4899;--sw:280px;--topbar-h:56px;--card-radius:14px;--safe-bottom: env(safe-area-inset-bottom, 0px);}
:root{--bg:#399499;--s1:#274a82;--s2:#131929;--s3:#1a2235;--b1:rgba(255,255,255,.06);--b2:rgba(255,255,255,.10);--t1:#f1f5ff;--t2:#8896b3;--t3:#ffffff;--red:#f5304a;--amber:#f59e0b;--teal:#06b6d4;--green:#10b981;--violet:#8b5cf6;--pink:#ec4899;--sw:280px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%;height:100dvh;-webkit-tap-highlight-color:transparent}
body{height:100%;height:100dvh;width:100%;background:var(--bg);color:var(--t1);font-family:'Inter',sans-serif;display:flex;flex-direction:column;overflow:hidden;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse 900px 600px at 5% 0%,rgba(245,48,74,.07) 0%,transparent 65%),radial-gradient(ellipse 700px 500px at 95% 100%,rgba(6,182,212,.06) 0%,transparent 65%);}
.load-overlay{position:fixed;inset:0;z-index:9999;background:rgba(8,12,20,.9);backdrop-filter:blur(10px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;transition:opacity .4s ease;}
.load-overlay.hidden{opacity:0;pointer-events:none}
.load-ring-wrap{position:relative;display:flex;align-items:center;justify-content:center}
.load-ring{width:64px;height:64px;border-radius:50%;border:3px solid rgba(255,255,255,.07);border-top-color:var(--red);border-right-color:var(--amber);animation:spin 1s linear infinite;box-shadow:0 0 24px rgba(245,48,74,.3);}
.load-logo{position:absolute;width:36px;height:36px;border-radius:8px;overflow:hidden;background:#fff}
.load-logo img{width:100%;height:100%;object-fit:contain}
.load-text{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:var(--t1);letter-spacing:1px}
.load-sub{font-size:11px;color:var(--t2);letter-spacing:2px;text-transform:uppercase}
.load-dots span{animation:blink 1.2s infinite;opacity:0}
.load-dots span:nth-child(2){animation-delay:.2s}
.load-dots span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:0}40%{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(1.3)}}
.topbar{position:fixed;top:0;left:0;right:0;height:var(--topbar-h);z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 16px;background:rgba(8,12,20,.92);backdrop-filter:blur(18px);border-bottom:1px solid var(--b1);flex-shrink:0;}
.topbar-left{display:flex;align-items:center;gap:10px}
.hamburger{width:36px;height:36px;border-radius:9px;background:var(--b1);border:1px solid var(--b2);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;cursor:pointer;flex-shrink:0;transition:background .2s;}
.hamburger:hover{background:var(--b2)}
.hamburger span{display:block;width:16px;height:1.5px;background:var(--t1);border-radius:2px;transition:all .3s}
.hamburger.open span:nth-child(1){transform:translateY(6.5px) rotate(45deg)}
.hamburger.open span:nth-child(2){opacity:0;transform:scaleX(0)}
.hamburger.open span:nth-child(3){transform:translateY(-6.5px) rotate(-45deg)}
.ttitle{font-family:'Syne',sans-serif;font-weight:800;font-size:17px;color:var(--t1)}
.ttitle span{color:var(--red)}
.tbadge{display:flex;align-items:center;gap:6px;background:var(--b1);border:1px solid var(--b2);border-radius:30px;padding:4px 10px;font-size:10px;color:var(--t2);font-weight:500;white-space:nowrap;}
.tbadge b{color:var(--teal);font-family:'JetBrains Mono',monospace;font-weight:600}
.dot{width:6px;height:6px;border-radius:50%;background:#10b981;box-shadow:0 0 7px #10b981;animation:pulse 2s ease infinite}
.sidebar-backdrop{position:fixed;inset:0;z-index:199;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);opacity:0;pointer-events:none;transition:opacity .3s ease;}
.sidebar-backdrop.open{opacity:1;pointer-events:auto}
.sidebar{position:fixed;top:0;left:0;bottom:0;width:var(--sw);max-width:88vw;z-index:200;background:var(--s1);border-right:1px solid var(--b1);display:flex;flex-direction:column;align-items:center;padding:calc(var(--topbar-h) + 16px) 14px calc(24px + var(--safe-bottom));gap:12px;overflow-y:auto;-webkit-overflow-scrolling:touch;transform:translateX(-110%);transition:transform .32s cubic-bezier(.4,0,.2,1);will-change:transform;}
.sidebar::after{content:'';position:absolute;top:0;right:0;bottom:0;width:1px;background:linear-gradient(to bottom,transparent,rgba(245,48,74,.4) 35%,rgba(139,92,246,.35) 65%,transparent);}
.sidebar.open{transform:translateX(0)}
.sidebar::-webkit-scrollbar{width:0}
.logo-wrap{width:72px;height:72px;border-radius:16px;overflow:hidden;background:#fff;flex-shrink:0;box-shadow:0 0 32px rgba(245,48,74,.2),0 8px 24px rgba(0,0,0,.5);border:1px solid rgba(245,48,74,.25);}
.logo-wrap img{width:100%;height:100%;object-fit:contain}
.brand{text-align:center}
.brand-name{font-family:'Syne',sans-serif;font-weight:800;font-size:14px;letter-spacing:2px;color:var(--t1);text-transform:uppercase}
.brand-sub{font-size:8.5px;color:var(--red);letter-spacing:3.5px;text-transform:uppercase;font-weight:600;margin-top:3px}
.divider{width:100%;height:1px;background:linear-gradient(to right,transparent,var(--b2),transparent);flex-shrink:0}
.flabel{align-self:flex-start;font-size:8px;font-weight:700;letter-spacing:2.5px;color:var(--t3);text-transform:uppercase;margin-bottom:2px}
.swrap{width:100%;position:relative}
.swrap::after{content:'▾';position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--t3);pointer-events:none;font-size:11px}
.swrap select{width:100%;background:var(--s3);color:var(--t1);border:1px solid var(--b1);border-radius:9px;padding:10px 28px 10px 11px;font-family:'Inter',sans-serif;font-size:13px;appearance:none;cursor:pointer;outline:none;-webkit-appearance:none;}
.swrap select:focus{border-color:rgba(245,48,74,.5);box-shadow:0 0 0 3px rgba(245,48,74,.1)}
.swrap select option{background:var(--s2)}
.channel-toggle{width:100%;display:grid;grid-template-columns:1fr 1fr;gap:4px;background:rgba(255,255,255,0.03);border:1px solid var(--b2);border-radius:12px;padding:4px;}
.ch-btn{padding:10px 4px;border:1px solid rgba(255,255,255,.1);border-radius:9px;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;letter-spacing:1.5px;cursor:pointer;transition:all .25s;color:var(--t2);background:transparent;text-transform:uppercase;-webkit-tap-highlight-color:transparent;}
.ch-btn.active{background:var(--red);color:#fff;border-color:var(--red);box-shadow:0 4px 16px rgba(245,48,74,.4),inset 0 1px 0 rgba(255,255,255,.15);}
.pcard{width:100%;background:var(--b1);border:1px solid var(--b1);border-radius:14px;overflow:hidden;display:flex;flex-direction:column;align-items:center;padding-bottom:14px;}
.pbanner{width:100%;height:40px;background:linear-gradient(135deg,#1a2235,rgba(245,48,74,.35) 120%)}
.aring{width:64px;height:64px;border-radius:50%;border:3px solid var(--s1);background:var(--s3);overflow:hidden;margin-top:-32px;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 20px rgba(0,0,0,.5),0 0 0 1px rgba(255,255,255,.07);flex-shrink:0;}
.aring img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.aicon{font-size:24px;line-height:1}
.pname{margin-top:8px;font-family:'Syne',sans-serif;font-weight:700;font-size:12px;color:var(--t1);text-align:center;padding:0 10px}
.pdesign{font-size:9.5px;color:var(--t2);margin-top:2px;text-align:center}
.pmeta{margin-top:8px;width:100%;padding:0 10px;display:flex;flex-direction:column;gap:4px}
.mrow{display:flex;align-items:center;gap:6px;font-size:10.5px;color:var(--t2);background:rgba(255,255,255,.03);border:1px solid var(--b1);border-radius:7px;padding:5px 8px}
.mval{color:var(--t1);font-weight:600;margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:10px}
.main{flex:1;display:flex;flex-direction:column;min-height:0;margin-top:var(--topbar-h);position:relative;z-index:1;}
.content{flex:1;min-height:0;overflow-y:auto;padding:16px 12px calc(16px + var(--safe-bottom));display:flex;flex-direction:column;gap:14px;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;}
.content::-webkit-scrollbar{width:3px}
.content::-webkit-scrollbar-track{background:transparent}
.content::-webkit-scrollbar-thumb{background:var(--b2);border-radius:4px}
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;opacity:.5;padding:40px 20px;text-align:center;}
.empty-state .es-icon{font-size:48px}
.empty-state .es-title{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;color:var(--t2)}
.empty-state .es-sub{font-size:12px;color:var(--t2)}
.section-title{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:var(--t1);letter-spacing:.5px;display:flex;align-items:center;gap:8px;}
.section-title::after{content:'';flex:1;height:1px;background:linear-gradient(to right,var(--b2),transparent)}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.stat-card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--card-radius);padding:12px 14px;display:flex;flex-direction:column;gap:5px;position:relative;overflow:hidden;transition:border-color .2s;}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.stat-card.red::before{background:linear-gradient(90deg,var(--red),rgba(245,48,74,.2))}
.stat-card.teal::before{background:linear-gradient(90deg,var(--teal),rgba(6,182,212,.2))}
.stat-card.green::before{background:linear-gradient(90deg,var(--green),rgba(16,185,129,.2))}
.stat-card.amber::before{background:linear-gradient(90deg,var(--amber),rgba(245,158,11,.2))}
.sc-label{font-size:8.5px;font-weight:600;letter-spacing:1.8px;text-transform:uppercase;color:var(--t2)}
.sc-value{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700;color:var(--t1);line-height:1}
.sc-sub{font-size:9.5px;color:var(--t2)}
.sc-badge{display:inline-flex;align-items:center;gap:4px;font-size:9.5px;font-weight:600;padding:2px 7px;border-radius:20px;margin-top:2px}
.sc-badge.good{background:rgba(16,185,129,.15);color:var(--green)}
.sc-badge.warn{background:rgba(245,158,11,.15);color:var(--amber)}
.sc-badge.bad{background:rgba(245,48,74,.15);color:var(--red)}
.gauge-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.gauge-card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--card-radius);padding:12px 10px;display:flex;flex-direction:column;align-items:center;gap:6px;}
.gauge-label{font-size:8px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--t2);text-align:center;line-height:1.4}
.gauge-wrap{position:relative;width:100%;max-width:110px;aspect-ratio:2/1}
.gauge-wrap canvas{width:100%!important;height:auto!important;max-height:60px}
.gauge-pct{position:absolute;bottom:0;left:50%;transform:translateX(-50%);font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:700;color:var(--t1);white-space:nowrap;}
.chart-grid{display:grid;grid-template-columns:1fr;gap:12px}
.chart-card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--card-radius);padding:14px;display:flex;flex-direction:column;gap:10px;}
.chart-title{font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--t2)}
.chart-wrap{position:relative;width:100%}
.chart-wrap canvas{max-height:180px}
.chart-wrap.tall canvas{max-height:200px}
.table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
.kpi-table{width:100%;border-collapse:collapse;font-size:11.5px;min-width:280px}
.kpi-table th{padding:8px 10px;text-align:left;font-size:8.5px;letter-spacing:1.8px;text-transform:uppercase;color:var(--t2);border-bottom:1px solid var(--b1);font-weight:600;white-space:nowrap}
.kpi-table td{padding:9px 10px;border-bottom:1px solid rgba(255,255,255,.03);color:var(--t1)}
.kpi-table tr:last-child td{border-bottom:none}
.kpi-table tr:active td{background:rgba(255,255,255,.02)}
.pill{display:inline-block;padding:2px 8px;border-radius:20px;font-size:9.5px;font-weight:600}
.pill.g{background:rgba(16,185,129,.15);color:var(--green)}
.pill.n{background:rgba(255,255,255,.05);color:var(--t2)}
.pbar-wrap{display:flex;align-items:center;gap:6px}
.pbar{flex:1;height:4px;background:rgba(255,255,255,.07);border-radius:3px;overflow:hidden;min-width:40px}
.pbar-fill{height:100%;border-radius:3px;transition:width .6s ease}
.pbar-pct{font-family:'JetBrains Mono',monospace;font-size:9.5px;color:var(--t2);min-width:28px;text-align:right}
@media(min-width:600px){.content{padding:20px 16px calc(20px + var(--safe-bottom))}.stat-grid{grid-template-columns:repeat(4,1fr)}.chart-grid{grid-template-columns:1fr 1fr}.sc-value{font-size:22px}.gauge-pct{font-size:17px}.chart-wrap canvas{max-height:200px}.chart-wrap.tall canvas{max-height:240px}}
@media(min-width:960px){body{flex-direction:row}.topbar{left:var(--sw);padding:0 24px;}.ttitle{font-size:20px}.hamburger{display:none}.sidebar-backdrop{display:none}.sidebar{position:fixed;top:0;left:0;bottom:0;width:var(--sw);transform:translateX(0)!important;padding:20px 14px 24px;border-right:1px solid var(--b1);}
.main{margin-top:0;margin-left:var(--sw);height:100%;height:100dvh;padding-top:var(--topbar-h);}.content{padding:20px 24px}.stat-grid{grid-template-columns:repeat(4,1fr);gap:12px}.chart-grid{grid-template-columns:1fr 1fr;gap:14px}.gauge-row{gap:12px}.gauge-pct{font-size:18px}}
</style>
</head>
<body>
<div class="load-overlay" id="loadOverlay">
<div class="load-ring-wrap">
<div class="load-ring"></div>
<div class="load-logo"><img src="https://lh3.googleusercontent.com/d/1ES-euNiP7XqrsflQXpnEIv23gMWXTerv" alt="Logo"></div>

</div>
<div class="divider"></div>

<script>
Chart.register(ChartDataLabels);
const $ = id => document.getElementById(id);
let allData = [], currentChannel = 'WORKSHOP', activeAdvisor = null;
const chartInstances = {};
$('monthLabel').textContent = new Date().toLocaleString('default',{month:'short',year:'numeric'});
const API_URL = 'https://script.google.com/macros/s/AKfycbw8TlOYZrLnavyCpjCYlpeR4ahdADEwQBFc78GmHzMkEWR7zJZXvUekrMnQ7hMbo7hePw/exec';
function toggleSidebar(){
const open = $('sidebar').classList.toggle('open');
$('sidebarBackdrop').classList.toggle('open', open);
$('hamburger').classList.toggle('open', open);
}
function closeSidebar(){
$('sidebar').classList.remove('open');
$('sidebarBackdrop').classList.remove('open');
$('hamburger').classList.remove('open');
}
async function loadData(){
$('loadOverlay').classList.remove('hidden');
try {
const res = await fetch(API_URL);
const raw = await res.json();
allData = Array.isArray(raw) ? raw : (raw.data || []);
} catch(e) {
console.warn('API fallback', e);
allData = [
{"empId":"MA013494","Name":"DEMUDU BABU GOGADA","design":"Asst. Service Advisor","imageId":"1rYVB6Pk-c__m2W-gZpEvDsTzOLPiAmNZ","doj":"2018-01-08T18:30:00.000Z","location":"100FT RING ROAD-2S","Channel":"WORKSHOP","MTDtarget":45,"Achieved":37,"LabTarget":99000,"LabAchieved":47697,"PerCar":1289,"VASlabour":10100,"PureLab":37598,"Tyres":"","Batteries":"","AMCBooks":"","CCP_PMS":"","EW_PowerPlus":"","EW_Extension":"","TimeEstimation":"","CostEstimation":""},
{"empId":"MA018144","Name":"A CHITTIBABU","design":"Service Advisor","imageId":"1bjrxEBnm_J0L8RKqSvCBAZZjOZvB96z8","doj":"2025-07-02T18:30:00.000Z","location":"ADAVIVARAM-2S","Channel":"BODYSHOP","MTDtarget":90,"Achieved":55,"LabTarget":198000,"LabAchieved":93694,"PerCar":1704,"VASlabour":29168,"PureLab":64526,"Tyres":"3","Batteries":"2","AMCBooks":"","CCP_PMS":"5","EW_PowerPlus":"","EW_Extension":"","TimeEstimation":"Y","CostEstimation":""},
{"empId":"MA017298","Name":"KARRI JAGADEESH","design":"Service Advisor","imageId":"1rYVB6Pk-c__m2W-gZpEvDsTzOLPiAmNZ","doj":"2024-01-01T18:30:00.000Z","location":"AGANAMPUDI-SRV","Channel":"WORKSHOP","MTDtarget":185,"Achieved":127,"LabTarget":407000,"LabAchieved":211494,"PerCar":1665,"VASlabour":18255,"PureLab":193239,"Tyres":"","Batteries":"","AMCBooks":"","CCP_PMS":"","EW_PowerPlus":"","EW_Extension":"","TimeEstimation":"","CostEstimation":""}
];
}
populateWorkshops();
populateAdvisors();
$('loadOverlay').classList.add('hidden');
}
function getChannelData(){
return allData.filter(d => {
const ch = (d.Channel || '').trim().toUpperCase();
if(currentChannel === 'BODYSHOP') return ch === 'BODYSHOP';
if(currentChannel === 'WORKSHOP') return ch !== 'BODYSHOP';
return true;
});
}
function populateWorkshops(){
const data = getChannelData();
const locations = [...new Set(data.map(d=>d.location).filter(Boolean))].sort();
const ws = $('selWorkshop');
ws.innerHTML = '<option value="">— All Workshops —</option>';
locations.forEach(l=>{ const o=document.createElement('option');o.value=l;o.textContent=l;ws.appendChild(o); });
}
function populateAdvisors(){
const ws = $('selWorkshop').value;
let data = getChannelData();
if(ws) data = data.filter(d=>d.location===ws);
const sel = $('selEmployee');
const prev = sel.value;
sel.innerHTML = '<option value="">— Select Advisor —</option>';
data.forEach(d=>{ const o=document.createElement('option');o.value=d.empId;o.textContent=d.Name;sel.appendChild(o); });
if(prev && [...sel.options].some(o=>o.value===prev)) sel.value = prev;
}
function onSelect(empId){
if(!empId){ showEmpty(); return; }
const d = allData.find(x=>x.empId===empId);
if(!d) return;
activeAdvisor = d;
updateProfile(d);
renderDashboard(d);
// auto-close sidebar on mobile after selection
if(window.innerWidth < 960) closeSidebar();
}
function updateProfile(d){
const ring = $('avatarRing');
ring.innerHTML = d.imageId
? `<img src="https://lh3.googleusercontent.com/d/${d.imageId}" alt="${d.Name}" onerror="this.parentNode.innerHTML='<span class=aicon>👤</span>'">`
: '<span class="aicon">👤</span>';
$('profileName').textContent = d.Name || '—';
$('profileDesign').textContent = d.design || '—';
$('metaDOJ').textContent = d.doj ? new Date(d.doj).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}) : '—';
$('metaWorkshop').textContent = (d.location||'—').replace(/-2S.*$/,'').trim();
$('metaChannel').textContent = d.Channel || '—';
}
const fmt= n => (!n && n!==0) ? '—' : typeof n==='number' ? n.toLocaleString('en-IN') : n;
const fmtK = n => { if(!n && n!==0) return'—'; const a=Math.abs(n); if(a>=100000)return'₹'+(n/100000).toFixed(1)+'L'; if(a>=1000)return'₹'+(n/1000).toFixed(1)+'K'; return'₹'+n; };
const pct= (a,b) => !b ? 0 : Math.min(100,(a/b)*100);
const badgeByPct = p => p>=80?'good':p>=50?'warn':'bad';
function destroyChart(id){ if(chartInstances[id]){chartInstances[id].destroy();delete chartInstances[id];} }
function showEmpty(){$('contentArea').innerHTML = `<div class="empty-state"><div class="es-icon">📊</div><div class="es-title">No Advisor Selected</div><div class="es-sub">Tap ☰ to open the menu and choose an advisor</div></div>`;}
function renderDashboard(d){
const carAch = pct(d.Achieved, d.MTDtarget);
const labAch = pct(d.LabAchieved, d.LabTarget);
const vasRatio = d.LabAchieved>0 ? pct(d.VASlabour, d.LabAchieved) : 0;
const mtdTarget = Math.round(d.MTDtarget || 0);
const mtdAchieved = Math.round(d.Achieved|| 0);
$('contentArea').innerHTML = `
<div class="stat-grid">
<div class="stat-card red">
<div class="sc-label">Cars — MTD Target</div>
<div class="sc-value">${fmt(mtdTarget)}</div>
<div class="sc-sub">Achieved: <b style="color:var(--t1)">${fmt(mtdAchieved)}</b></div>
<span class="sc-badge ${badgeByPct(carAch)}">▲ ${carAch.toFixed(1)}%</span>
</div>
<div class="stat-card teal">
<div class="sc-label">Labour Target</div>
<div class="sc-value">${fmtK(d.LabTarget)}</div>
<div class="sc-sub">Achieved: <b style="color:var(--t1)">${fmtK(d.LabAchieved)}</b></div>
<span class="sc-badge ${badgeByPct(labAch)}">▲ ${labAch.toFixed(1)}%</span>
</div>
<div class="stat-card green">
<div class="sc-label">Per RO</div>
<div class="sc-value">${fmt(d.PerCar)}</div>
<div class="sc-sub">VAS Labour: ${fmtK(d.VASlabour)}</div>
</div>
<div class="stat-card amber">
<div class="sc-label">Pure Labour</div>
<div class="sc-value">${fmtK(d.PureLab)}</div>
<div class="sc-sub">VAS%: <b style="color:var(--t1)">${vasRatio.toFixed(1)}%</b></div>
</div>
</div>
<div class="section-title">Achievement Meters</div>
<div class="gauge-row">
<div class="gauge-card">
<div class="gauge-label">Car Achievement</div>
<div class="gauge-wrap"><canvas id="gaugeCarAch"></canvas><div class="gauge-pct">${carAch.toFixed(0)}%</div></div>
</div>
<div class="gauge-card">
<div class="gauge-label">Labour Achievement</div>
<div class="gauge-wrap"><canvas id="gaugeLabAch"></canvas><div class="gauge-pct">${labAch.toFixed(0)}%</div></div>
</div>
<div class="gauge-card">
<div class="gauge-label">VAS Labour Mix</div>
<div class="gauge-wrap"><canvas id="gaugeVAS"></canvas><div class="gauge-pct">${vasRatio.toFixed(0)}%</div></div>
</div>
</div>
<div class="section-title">KPI Breakdown</div>
<div class="chart-grid">
<div class="chart-card">
<div class="chart-title">Cars — Target vs Achieved</div>
<div class="chart-wrap"><canvas id="chartCars"></canvas></div>
</div>
<div class="chart-card">
<div class="chart-title">Labour — Target vs Achieved</div>
<div class="chart-wrap"><canvas id="chartLabour"></canvas></div>
</div>
<div class="chart-card">
<div class="chart-title">Labour Breakup</div>
<div class="chart-wrap"><canvas id="chartLabBreak"></canvas></div>
</div>
<div class="chart-card">
<div class="chart-title">Achievement % Overview</div>
<div class="chart-wrap tall"><canvas id="chartAchPct"></canvas></div>
</div>
</div>
<div class="section-title">Add-on KPIs</div>
<div class="chart-card">
<div class="table-scroll">
<table class="kpi-table">
<thead><tr><th>KPI Metric</th><th>Status</th><th>Progress</th></tr></thead>
<tbody id="addonBody"></tbody>
</table>
</div>
</div>`;
drawGauge('gaugeCarAch', carAch, '#f59e0b');
drawGauge('gaugeLabAch', labAch, '#f59e0b');
drawGauge('gaugeVAS',vasRatio, '#f59e0b');
drawBarChart('chartCars',
['Target','Achieved'], [mtdTarget, mtdAchieved],
['rgba(245,48,74,.3)','rgba(16,185,129,.3)'],
['rgba(245,48,74,1)','rgba(16,185,129,1)'], {});
drawBarChart('chartLabour',
['Target','Achieved'], [d.LabTarget, d.LabAchieved],
['rgba(6,182,212,.3)','rgba(139,92,246,.3)'],
['rgba(6,182,212,1)','rgba(139,92,246,1)'], {kformat:true});
drawDoughnut('chartLabBreak',
['VAS Labour','Pure Labour'],
[Number(d.VASlabour)||0, Number(d.PureLab)||0],
['rgba(245,158,11,.85)','rgba(6,182,212,.85)']);
drawHorizBar('chartAchPct',
['Cars Ach%','Labour Ach%','VAS Mix%'],
[+carAch.toFixed(1), +labAch.toFixed(1), +vasRatio.toFixed(1)]);
const addons = [
['Tyres',d.Tyres],['Batteries',d.Batteries],['AMC Books',d.AMCBooks],
['CCP / PMS',d.CCP_PMS],['EW Power Plus',d.EW_PowerPlus],['EW Extension',d.EW_Extension],
['Time Estimation',d.TimeEstimation],['Cost Estimation',d.CostEstimation],
];
$('addonBody').innerHTML = addons.map(([label,val])=>{
const v = (val===''||val==null) ? null : val;
const barW = v ? Math.min(100,(Number(v)||1)*10) : 0;
return `<tr>
<td>${label}</td>
<td><span class="pill ${v?'g':'n'}">${v||'N/A'}</span></td>
<td><div class="pbar-wrap">
<div class="pbar"><div class="pbar-fill" style="width:${barW}%;background:${v?'var(--green)':'rgba(255,255,255,.07)'}"></div></div>
<span class="pbar-pct">${v||'—'}</span>
</div></td>
</tr>`;
}).join('');
}
function drawGauge(id, value, color){
destroyChart(id);
const ctx = document.getElementById(id)?.getContext('2d');
if(!ctx) return;
const v = Math.min(100, Math.max(0, value));
chartInstances[id] = new Chart(ctx,{
type:'doughnut',
data:{datasets:[{data:[v,100-v],backgroundColor:[color,'rgba(144,238,144,0.35)'],borderWidth:0,circumference:180,rotation:270}]},
options:{cutout:'75%',responsive:true,maintainAspectRatio:false,
plugins:{legend:{display:false},tooltip:{enabled:false},datalabels:{display:false}}}
});
}
function drawBarChart(id, labels, data, bgColors, borderColors, opts={}){
destroyChart(id);
const ctx = document.getElementById(id)?.getContext('2d');
if(!ctx) return;
const isK = opts.kformat;
chartInstances[id] = new Chart(ctx,{
type:'bar',
data:{labels,datasets:[{data,backgroundColor:bgColors,borderColor:borderColors,borderWidth:2,borderRadius:6,borderSkipped:false}]},
options:{
responsive:true,maintainAspectRatio:true,
plugins:{
legend:{display:false},
datalabels:{color:'#f1f5ff',font:{family:'JetBrains Mono',size:9,weight:'600'},
formatter:v=>isK?(v>=100000?'₹'+(v/100000).toFixed(1)+'L':v>=1000?'₹'+(v/1000).toFixed(1)+'K':'₹'+v):String(v)}
},
scales:{
x:{grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'#8896b3',font:{size:10}}},
y:{grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'#8896b3',font:{size:9},
callback:v=>isK?(v>=100000?(v/100000).toFixed(0)+'L':v>=1000?(v/1000).toFixed(0)+'K':v):v}}
}
}
});
}
function drawDoughnut(id, labels, data, colors){
destroyChart(id);
const ctx = document.getElementById(id)?.getContext('2d');
if(!ctx) return;
chartInstances[id] = new Chart(ctx,{
type:'doughnut',
data:{labels,datasets:[{data,backgroundColor:colors,borderWidth:0,hoverOffset:4}]},
options:{
responsive:true,maintainAspectRatio:true,cutout:'60%',
plugins:{
legend:{position:'bottom',labels:{color:'#8896b3',font:{size:9},boxWidth:10,padding:10}},
datalabels:{color:'#fff',font:{size:9,weight:'700'},
formatter:(v,c)=>{const t=c.dataset.data.reduce((a,b)=>a+b,0);return t>0?((v/t)*100).toFixed(0)+'%':'0%'}}
}
}
});
}
function drawHorizBar(id, labels, data){
destroyChart(id);
const ctx = document.getElementById(id)?.getContext('2d');
if(!ctx) return;
const colors = data.map(v=>v>=80?'rgba(16,185,129,.7)':v>=50?'rgba(245,158,11,.7)':'rgba(245,48,74,.7)');
chartInstances[id] = new Chart(ctx,{
type:'bar',
data:{labels,datasets:[{data,backgroundColor:colors,borderRadius:5,borderSkipped:false}]},
options:{
indexAxis:'y',responsive:true,maintainAspectRatio:true,
plugins:{
legend:{display:false},
datalabels:{color:'#f1f5ff',anchor:'end',align:'end',font:{family:'JetBrains Mono',size:9,weight:'600'},formatter:v=>v+'%'}
},
scales:{x:{max:100,grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'#8896b3',font:{size:9},callback:v=>v+'%'}},y:{grid:{display:false},ticks:{color:'#8896b3',font:{size:10}}}}}});}
window.addEventListener('DOMContentLoaded',()=>{
$('arenaBtn').addEventListener('click',()=>{ currentChannel='WORKSHOP'; setChannel(); });
$('nexaBtn').addEventListener('click',()=>{ currentChannel='BODYSHOP'; setChannel(); });
$('selWorkshop').addEventListener('change', populateAdvisors);
setChannel();
loadData();
});
function setChannel(){
$('arenaBtn').classList.toggle('active', currentChannel==='WORKSHOP');
$('nexaBtn').classList.toggle('active',currentChannel==='BODYSHOP');
populateWorkshops();
populateAdvisors();
showEmpty();
}
</script>
</body>
</html>
