<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>VARUN MARUTI SERVICE</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon /image" href="Logo.png" alt="Logo"></link>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>

<style>
body {margin:0;font-family: Arial;background:#f4f6fb;display:flex;}
.sidebar {
  width:220px;background:#3a3294;color:white;height:100vh;
  padding:20px 10px;display:flex;flex-direction:column;
  align-items:center;gap:15px;text-align:center;
}
.nav-btn {
  width:85%;padding:10px;border:none;border-radius:6px;
  cursor:pointer;font-weight:bold;background:#6366f1;color:white;
}
.nav-btn.active {background:#22c55e;}
.sidebar select {
  width:85%;padding:8px;border-radius:6px;border:none;text-align:center;
}
.label-box {font-size:12px;}
.main {flex:1;padding:10px;}
.cards {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:10px;
}
.card {
  background:white;padding:12px;border-radius:10px;
  box-shadow:0 3px 10px rgba(0,0,0,0.08);
}
.card-title {font-weight:bold;color:#2a2185;margin-bottom:5px;}
.kpi-grid {display:grid;grid-template-columns:repeat(2,1fr);gap:5px;}
.kpi-box {background:#f7f8fc;padding:6px;border-radius:6px;text-align:center;font-size:11px;}
.charts {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(400px,1fr));
  gap:15px;
  margin-top:15px;
  justify-items:center;
}
.chartBox {
  background:white;
  padding:10px;
  border-radius:10px;
  width:100%;
  max-width:600px;
  height:350px;
  display:flex;
  align-items:center;
  justify-content:center;
}
canvas {height:350px !important;}
</style>
</head>

<body>

<div class="sidebar">
<h3>KPI DASHBOARD</h3>

<button id="arenaBtn" class="nav-btn active">ARENA</button>
<button id="nexaBtn" class="nav-btn">NEXA</button>

<select id="workshopSelect"></select>

<div class="label-box">
<div>CLUSTER HEAD</div>
<strong id="Cluster_Head">-</strong>
</div>

<div class="label-box">
<div>WM / QM</div>
<strong id="Works_Manager">-</strong>
</div>
</div>

<div class="main">
<h2 id="channelTitle">ARENA CHANNEL</h2>

<div class="cards" id="cardsContainer"></div>

<div class="charts">

<!-- PIE CHARTS FIRST -->
<div class="chartBox"><canvas id="loadPieChart"></canvas></div>
<div class="chartBox"><canvas id="pmsPieChart"></canvas></div>
<div class="chartBox"><canvas id="npsCeiBarChart"></canvas></div>

</div>
</div>

<script>
document.addEventListener('contextmenu', e => e.preventDefault());
document.onkeydown = function(e) {
  if (e.keyCode == 123) return false; // F12
  if (e.ctrlKey && e.shiftKey && e.keyCode == 73) return false; // Ctrl+Shift+I
  if (e.ctrlKey && e.keyCode == 85) return false; // Ctrl+U
};
const API_URL="https://script.google.com/macros/s/AKfycbwQMksBtwCcRr0gkFHMdtlCuhElexU_fh1fDlOA69ECjZBxJXW4ywutrWm_5x5hkxWk/exec";

let dataStore=[], charts={}, currentChannel="ARENA";

const KPI_MAP = {
  "Ser Load": ["LY_S_Load","CY_S_Load"],
  "Ser Labor": ["LY_S_Labour","CY_S_Labour"],
  "Ser Per RO": ["LY_S_Per_RO","CY_S_Per_RO"],
  "Ser Spares": ["LY_S_Spares","CY_S_Spares"],
  "FSC Load": ["LY_FSC_LOAD","CY_FSC_LOAD"],
  "PMS Load": ["LY_PMS_LOAD","CY_PMS_LOAD"],
  "RR Load": ["LY_RR_LOAD","CY_RR_LOAD"],
  "BS Load": ["LY_B_Load","CY_B_Load"],
  "BS Labor": ["LY_B_Labour","CY_B_Labour"]
};

const LAKH_KPIS = ["Ser Labor","Ser Spares","BS Labor"];
const kpiCategories=Object.keys(KPI_MAP);

function formatLakhs(val){ return (val/100000).toFixed(1) + " L"; }

async function init(){
  const res=await fetch(API_URL);
  dataStore=await res.json();
  buildDropdown();
  buildKpiCards();
}

function buildDropdown(){
  const select=document.getElementById("workshopSelect");
  const workshops=[...new Set(dataStore.map(d=>d.Workshop))];
  select.innerHTML='<option value="">Select Workshop</option>';
  workshops.forEach(w=>{ select.innerHTML+=`<option value="${w}">${w}</option>`; });
}

document.getElementById("arenaBtn").onclick=()=>{currentChannel="ARENA";toggleActive("arenaBtn","nexaBtn");};
document.getElementById("nexaBtn").onclick=()=>{currentChannel="NEXA";toggleActive("nexaBtn","arenaBtn");};

function toggleActive(a,o){
  document.getElementById(a).classList.add("active");
  document.getElementById(o).classList.remove("active");
  document.getElementById("channelTitle").innerText=currentChannel+" CHANNEL";
  triggerUpdate();
}

document.getElementById("workshopSelect").addEventListener("change",triggerUpdate);

function triggerUpdate(){
  const val=document.getElementById("workshopSelect").value;
  if(!val) return;
  const filtered=dataStore.filter(d=>d.Workshop===val && d.Channel===currentChannel);
  if(filtered.length){
    document.getElementById("Cluster_Head").innerText=filtered[0].Cluster_Head||"-";
    document.getElementById("Works_Manager").innerText=filtered[0].Works_Manager||"-";
  }
  updateDashboard(filtered);
}

function buildKpiCards(){
  const c=document.getElementById("cardsContainer");
  c.innerHTML="";
  kpiCategories.forEach(cat=>{
    const key=cat.replace(/\s/g,'');
    c.innerHTML+=`
    <div class="card">
      <div class="card-title">${cat}</div>
      <div class="kpi-grid">
        <div class="kpi-box">LY<br><span id="${key}_LFY">-</span></div>
        <div class="kpi-box">CY<br><span id="${key}_CFY">-</span></div>
        <div class="kpi-box">SRT<br><span id="${key}_SRT">-</span></div>
        <div class="kpi-box">%<br><span id="${key}_ACH">-</span></div>
      </div>
    </div>`;
  });
}

// ---------------- Sequential Chart Rendering ----------------
function updateDashboard(data){
  const totals={}, pieData={FSC:0,PMS:0,RR:0,SER:0}, pmsSplit={PMS2:0,PMS3:0,PMS4:0,PMS5:0,PMS6:0};

  kpiCategories.forEach(cat=>{ const key=cat.replace(/\s/g,''); totals[key]={LFY:0,CFY:0}; });

  data.forEach(d=>{
    pieData.SER+=Number(d["CY_S_Load"]||0);
    pieData.FSC+=Number(d["CY_FSC_LOAD"]||0);
    pieData.PMS+=Number(d["CY_PMS_LOAD"]||0);
    pieData.RR+=Number(d["CY_RR_LOAD"]||0);

    pmsSplit.PMS2 += Number(d["PMS2"] || 0);
    pmsSplit.PMS3 += Number(d["PMS3"] || 0);
    pmsSplit.PMS4 += Number(d["PMS4"] || 0);
    pmsSplit.PMS5 += Number(d["PMS5"] || 0);
    pmsSplit.PMS6 += Number(d["PMS>5"] || 0);

    kpiCategories.forEach(cat=>{
      const key=cat.replace(/\s/g,'');
      const map=KPI_MAP[cat];
      const LFY=Number(d[map[0]]||0);
      const CFY=Number(d[map[1]]||0);
      totals[key].LFY+=LFY;
      totals[key].CFY+=CFY;
    });
  });

  kpiCategories.forEach(cat=>{
    const key=cat.replace(/\s/g,'');
    let LFY=totals[key].LFY, CFY=totals[key].CFY, SRT=CFY-LFY;
    if(LAKH_KPIS.includes(cat)){ LFY=formatLakhs(LFY); CFY=formatLakhs(CFY); SRT=formatLakhs(SRT);}
    document.getElementById(`${key}_LFY`).innerText=LFY;
    document.getElementById(`${key}_CFY`).innerText=CFY;
    document.getElementById(`${key}_SRT`).innerText=SRT;
    document.getElementById(`${key}_ACH`).innerText=LFY?((CFY/LFY-1)*100).toFixed(1)+"%":"0%";
  });

  // ----------------- Draw charts in sequence -----------------
  drawPieChart(pieData);
  setTimeout(() => {
    drawPmsPieChart(pmsSplit);
    setTimeout(() => {
      drawNpsCeiBarChart(data[0]);
    }, 100);
  }, 100);
}

// ---------------- Service Load Pie ----------------
function drawPieChart(p){
  const id="loadPieChart"; if(charts[id]) charts[id].destroy();
  let others=p.SER-(p.FSC+p.PMS+p.RR); if(others<0) others=0;
  const data=[p.FSC,p.PMS,p.RR,others]; const total=data.reduce((a,b)=>a+b,0);

  const centerBoxPlugin = {id:'centerBox',beforeDraw:(chart)=>{
    const ctx=chart.ctx,width=chart.width,height=chart.height;
    ctx.save();
    ctx.fillStyle="#ffffff"; ctx.shadowColor="rgba(0,0,0,0.2)"; ctx.shadowBlur=4;
    ctx.shadowOffsetX=2; ctx.shadowOffsetY=2;
    ctx.fillRect(width/2-75,height/2-20,150,40);
    ctx.fillStyle="#2a2185"; ctx.font="bold 14px Arial";
    ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.fillText("Service Wise Load",width/2,height/2);
    ctx.restore();
  }};

  charts[id]=new Chart(document.getElementById(id),{
    type:"doughnut",
    data:{labels:["FSC","PMS","RR","Others"],datasets:[{data}]},
    options:{plugins:{legend:{display:false},datalabels:{color:"#111",align:"center",anchor:"center",
      formatter:(value,ctx)=>{let label=ctx.chart.data.labels[ctx.dataIndex];let pct=total?((value/total)*100).toFixed(1):"0.0";return label+"\n"+value+" ("+pct+"%)";}}}},
    plugins:[ChartDataLabels,centerBoxPlugin]
  });
}

// ---------------- PMS Pie ----------------
function drawPmsPieChart(p){
  const id="pmsPieChart"; if(charts[id]) charts[id].destroy();
  const data=[p.PMS2,p.PMS3,p.PMS4,p.PMS5,p.PMS6]; const total=data.reduce((a,b)=>a+b,0);

  const centerBoxPlugin={id:'centerBox',beforeDraw:(chart)=>{
    const ctx=chart.ctx,width=chart.width,height=chart.height;
    ctx.save(); ctx.fillStyle="#ffffff"; ctx.shadowColor="rgba(0,0,0,0.2)";
    ctx.shadowBlur=4; ctx.shadowOffsetX=2; ctx.shadowOffsetY=2;
    ctx.fillRect(width/2-75,height/2-20,150,40);
    ctx.fillStyle="#2a2185"; ctx.font="bold 14px Arial";
    ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.fillText("PMS Sub Services",width/2,height/2); ctx.restore();
  }};

  charts[id]=new Chart(document.getElementById(id),{
    type:"doughnut",
    data:{labels:["PMS2","PMS3","PMS4","PMS5","PMS>5"],datasets:[{data}]},
    options:{plugins:{legend:{display:false},datalabels:{color:"#111",align:"center",anchor:"center",
      font:{size:12,weight:"bold"},
      formatter:(value,ctx)=>{const label=ctx.chart.data.labels[ctx.dataIndex];const pct=total?((value/total)*100).toFixed(1):"0.0";return label+"\n"+value+" ("+pct+"%)";}}}},
    plugins:[ChartDataLabels,centerBoxPlugin]
  });
}

// ---------------- NPS/CEI Bar ----------------
function drawNpsCeiBarChart(p){
  const id = "npsCeiBarChart"; if(charts[id]) charts[id].destroy();
  const labels = ["S_NPS","S_CEI","B_NPS","B_CEI"];
  const data = [p.S_NPS, p.S_CEI, p.B_NPS, p.B_CEI];
  const total = data.reduce((a,b)=>a+b,0);

  charts[id]=new Chart(document.getElementById(id),{
    type:"bar",
    data:{labels,datasets:[{label:"NPS / CEI",data,backgroundColor:["#6366f1","#22c55e","#facc15","#f87171"],borderRadius:6}]},
    options:{
      responsive:true,
      plugins:{legend:{display:false},datalabels:{color:"#111",anchor:"center",align:"center",font:{size:12,weight:"bold"},formatter:(value)=>value}},
      scales:{y:{beginAtZero:true,ticks:{stepSize:Math.ceil(total/4)}},x:{grid:{display:false}}}
    },
    plugins:[ChartDataLabels]
  });
}

setInterval(init,300000);
init();
</script>

</body>
</html>
